server {
    listen 80;
    server_name grafana.local;

    location / {
        proxy_pass http://grafana:3000;
    }
}

server {
    listen 80;
    server_name prometheus.local;

    location / {
        proxy_pass http://prometheus:9090;
    }
}

server {
    listen 80;
    server_name uptime.local;

    location / {
        proxy_pass http://uptime-kuma:3001;
    }
}